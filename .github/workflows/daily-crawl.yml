name: Daily AI News Crawl

# Run daily at 8:00 AM UTC
on:
  schedule:
    - cron: "0 8 * * *"
  # Allow manual triggering
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          LOG_LEVEL: INFO
          MAX_ARTICLES_PER_CATEGORY: 15
        run: |
          python main.py

      - name: Notify on failure
        if: failure()
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python -c "
import os
import smtplib
from email.mime.text import MIMEText
msg = MIMEText('The daily AI news crawler failed. Please check the GitHub Actions run.')
msg['Subject'] = 'ALERT: AI Daily Briefing Failed'
msg['From'] = os.environ['SMTP_USERNAME']
msg['To'] = os.environ['RECIPIENT_EMAIL']
with smtplib.SMTP(os.environ['SMTP_SERVER'], int(os.environ['SMTP_PORT'])) as server:
    server.starttls()
    server.login(os.environ['SMTP_USERNAME'], os.environ['SMTP_PASSWORD'])
    server.send_message(msg)
          "
